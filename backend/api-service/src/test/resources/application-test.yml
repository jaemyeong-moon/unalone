server:
  port: 0

spring:
  application:
    name: api-service-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: api-test-group
      auto-offset-reset: earliest

jwt:
  secret: TestSecretKeyForJwtTokenGenerationMin32Bytes!!
  expiration: 86400000

kafka:
  topics:
    checkin-events: checkin-events
    alert-events: alert-events
    escalation-events: escalation-events
    anomaly-events: anomaly-events
    health-journal-events: health-journal-events
    health-alert-events: health-alert-events
    care-visit-events: care-visit-events
    care-match-events: care-match-events

crawling:
  enabled: false

translation:
  enabled: false

logging:
  level:
    com.project: DEBUG
