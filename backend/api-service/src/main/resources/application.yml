server:
  port: 8080

spring:
  application:
    name: api-service
  datasource:
    url: jdbc:postgresql://localhost:5432/project_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: api-service-group
      auto-offset-reset: earliest

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret: ThisIsASecretKeyForJwtTokenGenerationMin32Bytes!
  expiration: 86400000

kafka:
  topics:
    checkin-events: checkin-events
    alert-events: alert-events
    escalation-events: escalation-events
    anomaly-events: anomaly-events
    health-journal-events: health-journal-events
    health-alert-events: health-alert-events
    care-visit-events: care-visit-events
    care-match-events: care-match-events

oauth:
  frontend-redirect-uri: ${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:3000}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/oauth/kakao/callback}
    authorization-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    scope: profile_nickname,profile_image,account_email
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
    scope: email+profile

crawling:
  enabled: true
  user-agent: "UnaloneBot/1.0"
  timeout: 10000
  rate-limit-ms: 1000
  auto-publish-threshold: 70
  max-articles-per-source: 10

translation:
  enabled: true
  target-language: en
  batch-size: 50
  max-retries: 3

logging:
  level:
    com.project: DEBUG
