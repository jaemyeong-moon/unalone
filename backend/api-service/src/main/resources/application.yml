server:
  port: 8080

spring:
  application:
    name: api-service
  datasource:
    url: jdbc:postgresql://localhost:5432/project_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: api-service-group
      auto-offset-reset: earliest

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret: ThisIsASecretKeyForJwtTokenGenerationMin32Bytes!
  expiration: 86400000

kafka:
  topics:
    checkin-events: checkin-events
    alert-events: alert-events

logging:
  level:
    com.project: DEBUG
