server:
  port: 8081

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://localhost:5432/project_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    mongodb:
      uri: mongodb://localhost:27017/project_db
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: admin-service-group
      auto-offset-reset: earliest

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

kafka:
  topics:
    checkin-events: checkin-events
    alert-events: alert-events
    care-visit-events: care-visit-events
    care-match-events: care-match-events

logging:
  level:
    com.project: DEBUG
