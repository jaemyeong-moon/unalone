server:
  port: 0

spring:
  application:
    name: event-service-test
  data:
    mongodb:
      uri: mongodb://localhost:27017/test
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: event-test-group
      auto-offset-reset: earliest

kafka:
  topics:
    checkin-events: checkin-events
    alert-events: alert-events

logging:
  level:
    com.project: DEBUG
